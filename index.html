<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Saet mo po</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        font-family: "Times New Roman", Times, serif, sans-serif;
      }
      body {
        height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
        overflow: hidden;
        background: linear-gradient(-45deg, #ffd54f, #ffb300, #ff9800, #fff176);
        background-size: 400% 400%;
        animation: bg 12s ease infinite;
      }
      @keyframes bg {
        0% {
          background-position: 0% 50%;
        }
        50% {
          background-position: 100% 50%;
        }
        100% {
          background-position: 0% 50%;
        }
      }
      body::before,
      body::after {
        content: "";
        position: absolute;
        width: 200%;
        height: 200%;
        background-image: radial-gradient(circle, #fff8 2px, transparent 2px);
        background-size: 80px 80px;
        animation: float 30s linear infinite;
        opacity: 0.5;
      }
      body::after {
        animation-duration: 45s;
        transform: rotate(180deg);
      }
      @keyframes float {
        from {
          transform: translateY(0);
        }
        to {
          transform: translateY(-300px);
        }
      }
      .player {
        width: 380px;
        padding: 35px;
        border-radius: 35px;
        background: rgba(255, 255, 255, 0.12);
        backdrop-filter: blur(20px); /* Border */
        border: 2px solid rgba(255, 255, 255, 0.35); /* Glow */
        box-shadow:
          0 0 40px rgba(255, 255, 255, 0.2),
          0 0 80px rgba(255, 215, 0, 0.2),
          inset 0 0 25px rgba(255, 255, 255, 0.15);
        text-align: center;
        color: white;
        z-index: 2;
        position: relative;
      }
      .cover {
        width: 220px;
        height: 220px;
        margin: auto;
        border-radius: 50%;
        overflow: hidden;
        border: 5px solid rgba(255, 255, 255, 0.4);
        box-shadow: 0 0 40px gold;
        animation: spin 20s linear infinite;
      }
      .cover img {
        width: 100%;
        height: 100%;
        object-fit: cover;
      }
      @keyframes spin {
        from {
          transform: rotate(0deg);
        }
        to {
          transform: rotate(360deg);
        }
      }
      h1 {
        margin-top: 25px;
        font-size: 36px;
        font-weight: bold;
        color: black;
      }
      h3 {
        margin-top: 10px;
        font-weight: normal;
        color: black;
      }
      audio {
        width: 100%;
        margin-top: 35px;
      }
      .heart {
        font-size: 35px;
        margin-top: 20px;
        animation: pulse 2s infinite;
      }
      @keyframes pulse {
        50% {
          transform: scale(1.2);
          color: gold;
        }
      }
      .footer {
        margin-top: 25px;
        font-size: 20px;
        opacity: 0.7;
        color: black;
      }
    </style>
  </head>
  <body>
    <div class="player">
      <div class="cover"><img src="sf2.jpg" /></div>
      <a
        href="https://open.spotify.com/track/7h2nmmoWDi2UpfYKLKWLYB"
        target="_blank"
      >
        <h1 class="Title">Sunflower</h1>
      </a>
      <h3>Rex Orange County</h3>
      <audio controls loop>
        <source
          src="Rex Orange County - Sunflower (Official Audio).mp3"
          type="audio/mpeg"
        />
      </audio>
      <div class="heart"></div>
      <a
        href="https://docs.google.com/forms/d/1vl_pXSYq9YriRK_BHtwiAOD0XotldQ-5N4dNciLe0OQ/edit"
        target="_blank"
      >
        <div class="footer">S4n b aq n4gk0lng ☹️</div>
      </a>
    </div>
  </body>
</html>
